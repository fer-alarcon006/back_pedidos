services:
  backend:
    build: .
    container_name: backend
    environment:
      - MONGO_URI=${MONGO_URI}
    ports:
      - "3001:3001"
    volumes:
      - .:/app
    command: npm run dev

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - backend